type Product {
  id: ID!
  name: String!
  category: String!
  description: String!
  status: String!
  grades: [Grade!]!
}

type Grade {
  id: ID!
  productId: ID!
  name: String!
  description: String!
  status: String!
  price: Float!
}

type DailyPrice {
  id: ID!
  productId: ID!
  gradeId: ID!
  price: Float!
  date: String!
  time: String!
}

type Transaction {
  id: ID!
  userId: ID!
  spiceGradeId: ID!
  type: String!
  quantity: Float!
  price: Float!
  tradeDate: String!
  createdAt: String!
}

type PositionView {
  userId: ID!
  spiceGradeId: ID!
  totalQty: Float!
  totalCost: Float!
  avgCost: Float!
  todayPrice: Float!
  realizedPnL: Float!
  unrealizedPnL: Float!
  updatedAt: String!
}

type Query {
  products(date: String, search: String): [Product!]!
  getGradePosition(spiceGradeId: ID!): PositionView!
  getPositions: [PositionView!]!
  listGradeTransactions(spiceGradeId: ID!, skip: Int, take: Int): [Transaction!]!
  listTransactions(skip: Int, take: Int): [Transaction!]!
  adminDashboard: AdminDashboard!
}

type AdminDashboard {
  totalUsers: Int!
  totalProducts: Int!
  totalTransactions: Int!
  totalVolume: Float!
  recentTransactions: [Transaction!]!
  topProducts: [TopProduct!]!
}

type TopProduct {
  name: String!
  volume: Float!
}

type Mutation {
  createProduct(input: CreateProductInput!): Product!
  createGrade(input: CreateGradeInput!): Grade!
  createDailyPrice(input: CreateDailyPriceInput!): DailyPrice!
  buy(spiceGradeId: ID!, quantity: Float!, price: Float!, tradeDate: String): Transaction!
  sell(spiceGradeId: ID!, quantity: Float!, price: Float!, tradeDate: String): Transaction!
}

input CreateProductInput {
  id: ID!
  name: String!
  category: String!
  description: String
  status: String
}

input CreateGradeInput {
  id: ID!
  productId: ID!
  name: String!
  description: String
  status: String
}


input CreateDailyPriceInput {
  id: ID!
  productId: ID!
  gradeId: ID!
  price: Float!
  date: String!
  time: String!
}
