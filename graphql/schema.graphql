type Product {
  id: ID!
  name: String!
  category: String!
  description: String!
  status: String!
  grades: [Grade!]!
}

type Grade {
  id: ID!
  productId: ID!
  name: String!
  description: String!
  status: String!
  price: Float!
}

type DailyPrice {
  id: ID!
  productId: ID!
  gradeId: ID!
  price: Float!
  date: String!
  time: String!
}

type Transaction {
  id: ID!
  userId: ID!
  spiceGradeId: ID!
  type: String!
  quantity: Float!
  price: Float!
  tradeDate: String!
  createdAt: String!
}

type PositionView {
  userId: ID!
  spiceGradeId: ID!
  totalQty: Float!
  totalCost: Float!
  avgCost: Float!
  todayPrice: Float!
  realizedPnL: Float!
  unrealizedPnL: Float!
  updatedAt: String!
}

type Query {
  products(date: String, search: String): [Product!]!
  getGradePosition(spiceGradeId: ID!): PositionView!
  getPositions: [PositionView!]!
  listGradeTransactions(spiceGradeId: ID!, skip: Int, take: Int): [Transaction!]!
  listTransactions(skip: Int, take: Int): [Transaction!]!
  adminDashboard: AdminDashboard!
  merchantDashboard(days: Int): MerchantDashboard!
}

type AdminDashboard {
  totalUsers: Int!
  totalProducts: Int!
  totalTransactions: Int!
  totalVolume: Float!
  recentTransactions: [Transaction!]!
  topProducts: [TopProduct!]!
}

type TopProduct {
  name: String!
  volume: Float!
}

type MerchantDashboard {
  summary: MerchantSummary!
  holdings: [MerchantHolding!]!
  portfolioMix: [PortfolioSlice!]!
  pnlTrend: [PnLPoint!]!
  activityTrend: [ActivityDay!]!
  recentTransactions: [Transaction!]!
  insights: [MerchantInsight!]!
  movers: [PriceMover!]!
}

type MerchantSummary {
  portfolioValue: Float!
  totalCost: Float!
  totalRealizedPnL: Float!
  totalUnrealizedPnL: Float!
  netPnL: Float!
  openPositions: Int!
  totalQuantityKg: Float!
  tradesInPeriod: Int!
  buyVolumeInPeriod: Float!
  sellVolumeInPeriod: Float!
}

type MerchantHolding {
  spiceGradeId: ID!
  productName: String!
  gradeName: String!
  quantity: Float!
  avgCost: Float!
  todayPrice: Float!
  marketValue: Float!
  costBasis: Float!
  unrealizedPnL: Float!
  unrealizedPnLPercent: Float!
  realizedPnL: Float!
  weightPercent: Float!
}

type PortfolioSlice {
  label: String!
  value: Float!
  quantity: Float!
}

type PnLPoint {
  date: String!
  dailyRealizedPnL: Float!
  cumulativeRealizedPnL: Float!
}

type ActivityDay {
  date: String!
  buyQuantity: Float!
  sellQuantity: Float!
  buyCount: Int!
  sellCount: Int!
}

type MerchantInsight {
  kind: String!
  title: String!
  body: String!
  spiceGradeId: ID
  severity: String!
}

type PriceMover {
  spiceGradeId: ID!
  productName: String!
  gradeName: String!
  todayPrice: Float!
  previousPrice: Float!
  changePercent: Float!
  direction: String!
}

type Mutation {
  createProduct(input: CreateProductInput!): Product!
  createGrade(input: CreateGradeInput!): Grade!
  createDailyPrice(input: CreateDailyPriceInput!): DailyPrice!
  buy(spiceGradeId: ID!, quantity: Float!, price: Float!, tradeDate: String): Transaction!
  sell(spiceGradeId: ID!, quantity: Float!, price: Float!, tradeDate: String): Transaction!
}

input CreateProductInput {
  id: ID!
  name: String!
  category: String!
  description: String
  status: String
}

input CreateGradeInput {
  id: ID!
  productId: ID!
  name: String!
  description: String
  status: String
}


input CreateDailyPriceInput {
  id: ID!
  productId: ID!
  gradeId: ID!
  price: Float!
  date: String!
  time: String!
}
