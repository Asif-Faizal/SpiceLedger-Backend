x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-health-interval: &health-interval
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

x-build: &build-default
  pull: false

services:
  db:
    profiles: ["infra", "full"]
    build:
      <<: *build-default
      context: .
      dockerfile: control/db.dockerfile
    image: spice-ledger-db
    container_name: spice-ledger-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-1234}
      MYSQL_DATABASE: ${DB_NAME:-spice_ledger}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      <<: *health-interval
    logging: *default-logging
    restart: unless-stopped

  migrate:
    profiles: ["infra", "full"]
    build:
      <<: *build-default
      context: .
      dockerfile: migrate.dockerfile
    image: spice-ledger-migrate
    container_name: spice-ledger-migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - ./migrations:/app/migrations:ro
    restart: "no"

  control:
    profiles: ["full"]
    build:
      <<: *build-default
      context: .
      dockerfile: control/app.dockerfile
    image: spice-ledger-control
    container_name: spice-ledger-control
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: db
      DB_PORT: 3306
    ports:
      - "${CONTROL_GRPC_PORT:-50051}:50051"
    logging: *default-logging
    restart: unless-stopped

  market:
    profiles: ["full"]
    build:
      <<: *build-default
      context: .
      dockerfile: market/app.dockerfile
    image: spice-ledger-market
    container_name: spice-ledger-market
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      control:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: db
      DB_PORT: 3306
    ports:
      - "${MARKET_GRPC_PORT:-50052}:50052"
    logging: *default-logging
    restart: unless-stopped

  rest:
    profiles: ["full"]
    build:
      <<: *build-default
      context: .
      dockerfile: rest/app.dockerfile
    image: spice-ledger-rest
    container_name: spice-ledger-rest
    depends_on:
      control:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      ACCOUNT_GRPC_URL: control:50051
      REST_PORT: 8082
    ports:
      - "${REST_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      <<: *health-interval
    logging: *default-logging
    restart: unless-stopped

  graphql:
    profiles: ["full"]
    build:
      <<: *build-default
      context: .
      dockerfile: graphql/app.dockerfile
    image: spice-ledger-graphql
    container_name: spice-ledger-graphql
    depends_on:
      control:
        condition: service_started
      market:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      ACCOUNT_GRPC_URL: control:50051
      MARKET_GRPC_URL: market:50052
      GRAPHQL_PORT: 8081
    ports:
      - "${GRAPHQL_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      <<: *health-interval
    logging: *default-logging
    restart: unless-stopped

  proxy:
    profiles: ["full"]
    build:
      <<: *build-default
      context: .
      dockerfile: proxy/app.dockerfile
    image: spice-ledger-proxy
    container_name: spice-ledger-proxy
    depends_on:
      rest:
        condition: service_healthy
      graphql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      ACCOUNT_SERVICE_URL: http://rest:8082
      GRAPHQL_GATEWAY_URL: http://graphql:8081
      PROXY_PORT: 8080
    ports:
      - "${PROXY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      <<: *health-interval
    logging: *default-logging
    restart: unless-stopped

volumes:
  mysql_data:
    name: spice_ledger_mysql_data
