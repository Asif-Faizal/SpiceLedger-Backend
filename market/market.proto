// protoc --go_out=./pb --go-grpc_out=./pb market.proto
syntax = "proto3";

package pb;

option go_package = "./pb";

message Transaction {
  string id = 1;
  string user_id = 2;
  string spice_grade_id = 3;
  string type = 4;
  double quantity = 5;
  double price = 6;
  string trade_date = 7; // YYYY-MM-DD
  string created_at = 8; // YYYY-MM-DD HH:MM:SS
}

message PositionView {
  string user_id = 1;
  string spice_grade_id = 2;
  double total_qty = 3;
  double total_cost = 4;
  double avg_cost = 5;
  double today_price = 6;
  double realized_pnl = 7;
  double unrealized_pnl = 8;
  string updated_at = 9;
}

message BuyRequest {
  string user_id = 1;
  string spice_grade_id = 2;
  double quantity = 3;
  double price = 4;
  string trade_date = 5; // YYYY-MM-DD
}

message BuyResponse {
  Transaction transaction = 1;
}

message SellRequest {
  string user_id = 1;
  string spice_grade_id = 2;
  double quantity = 3;
  double price = 4;
  string trade_date = 5; // YYYY-MM-DD
}

message SellResponse {
  Transaction transaction = 1;
}

message GetGradePositionRequest {
  string user_id = 1;
  string spice_grade_id = 2;
}

message GetGradePositionResponse {
  PositionView position = 1;
}

message GetPositionsRequest {
  string user_id = 1;
}

message GetPositionsResponse {
  repeated PositionView positions = 1;
}

message ListGradeTransactionsRequest {
  string user_id = 1;
  string spice_grade_id = 2;
  uint32 skip = 3;
  uint32 take = 4;
}

message ListGradeTransactionsResponse {
  repeated Transaction transactions = 1;
}

message ListTransactionsRequest {
  string user_id = 1;
  uint32 skip = 2;
  uint32 take = 3;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
}

message GetMarketMetricsRequest {}

message GetMarketMetricsResponse {
  uint32 total_transactions = 1;
  double total_volume = 2;
  message TopProduct {
    string product_name = 1;
    string grade_name = 2;
    double volume = 3;
  }
  repeated TopProduct top_products = 3;
}

// --- Merchant dashboard (JWT-scoped: portfolio + transactions belong to authenticated merchant only) ---

message GetMerchantDashboardRequest {
  // Trend window in days for charts (default 7, max 90). Account identity comes from JWT only.
  uint32 days = 1;
}

message MerchantSummary {
  double portfolio_value = 1;
  double total_cost = 2;
  double total_realized_pnl = 3;
  double total_unrealized_pnl = 4;
  double net_pnl = 5;
  uint32 open_positions = 6;
  double total_quantity_kg = 7;
  uint32 trades_in_period = 8;
  double buy_volume_in_period = 9;
  double sell_volume_in_period = 10;
}

message MerchantHolding {
  string spice_grade_id = 1;
  string product_name = 2;
  string grade_name = 3;
  double quantity = 4;
  double avg_cost = 5;
  double today_price = 6;
  double market_value = 7;
  double cost_basis = 8;
  double unrealized_pnl = 9;
  double unrealized_pnl_percent = 10;
  double realized_pnl = 11;
  double weight_percent = 12;
}

message PortfolioSlice {
  string label = 1;
  double value = 2;
  double quantity = 3;
}

message PnLPoint {
  string date = 1; // YYYY-MM-DD
  double daily_realized_pnl = 2;
  double cumulative_realized_pnl = 3;
}

message ActivityDay {
  string date = 1; // YYYY-MM-DD
  double buy_quantity = 2;
  double sell_quantity = 3;
  uint32 buy_count = 4;
  uint32 sell_count = 5;
}

message MerchantInsight {
  string kind = 1; // WINNER, LOSER, STREAK, IDLE, MILESTONE, CONCENTRATION
  string title = 2;
  string body = 3;
  string spice_grade_id = 4; // optional, empty when portfolio-wide
  string severity = 5; // info, success, warning
}

message PriceMover {
  string spice_grade_id = 1;
  string product_name = 2;
  string grade_name = 3;
  double today_price = 4;
  double previous_price = 5;
  double change_percent = 6;
  string direction = 7; // UP, DOWN, FLAT
}

message GetMerchantDashboardResponse {
  MerchantSummary summary = 1;
  repeated MerchantHolding holdings = 2;
  repeated PortfolioSlice portfolio_mix = 3;
  repeated PnLPoint pnl_trend = 4;
  repeated ActivityDay activity_trend = 5;
  repeated Transaction recent_transactions = 6;
  repeated MerchantInsight insights = 7;
  repeated PriceMover movers = 8;
}

service MarketService {
  rpc Buy(BuyRequest) returns (BuyResponse);
  rpc Sell(SellRequest) returns (SellResponse);
  rpc GetGradePosition(GetGradePositionRequest) returns (GetGradePositionResponse);
  rpc GetPositions(GetPositionsRequest) returns (GetPositionsResponse);
  rpc ListGradeTransactions(ListGradeTransactionsRequest) returns (ListGradeTransactionsResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetMarketMetrics(GetMarketMetricsRequest) returns (GetMarketMetricsResponse);
  // Returns dashboard data for the authenticated merchant only (account_id from JWT).
  rpc GetMerchantDashboard(GetMerchantDashboardRequest) returns (GetMerchantDashboardResponse);
}
