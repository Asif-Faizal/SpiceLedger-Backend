// protoc --go_out=./pb --go-grpc_out=./pb control.proto
syntax = "proto3";

package pb;

option go_package = "./pb";

message Account {
  string id = 1;
  string name = 2;
  string usertype = 3;
  string email = 4;
  string password = 5;
}

message MerchantDetails {
  string id = 1;
  string account_id = 2;
  string phone_number = 3;
  string address = 4;
  string city = 5;
  string state = 6;
  string pincode = 7;
}

message Product {
  string id = 1;
  string name = 2;
  string category = 3;
  string description = 4;
  string status = 5;
}

message Grade {
  string id = 1;
  string product_id = 2;
  string name = 3;
  string description = 4;
  string status = 5;
}

message GradeWithPrice {
  string id = 1;
  string product_id = 2;
  string name = 3;
  string description = 4;
  string status = 5;
  double price = 6;
}

message ProductWithGrades {
  string id = 1;
  string name = 2;
  string category = 3;
  string description = 4;
  string status = 5;
  repeated GradeWithPrice grades = 6;
}

message DailyPrice {
  string id = 1;
  string product_id = 2;
  string grade_id = 3;
  double price = 4;
  string date = 5; // YYYY-MM-DD
  string time = 6; // HH:MM:SS
}

message CheckEmailExistsRequest {
  string email = 1;
}

message CheckEmailExistsResponse {
  bool exists = 1;
}

message CreateOrUpdateAccountRequest {
  string id = 1;
  string name = 2;
  string usertype = 3;
  string email = 4;
  string password = 5;
}

message CreateOrUpdateAccountResponse {
  Account account = 1;
}


message GetAccountByIDRequest {
  string id = 1;
}

message GetAccountByIDResponse {
  Account account = 1;
}

message ListAccountsRequest {
  uint32 skip = 1;
  uint32 take = 2;
}
 
message ListAccountsResponse {
  repeated Account accounts = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string device_id = 3;
}

message LoginResponse {
  Account account = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message LogoutRequest {
  string access_token = 1;
  string device_id = 2;
}

message LogoutResponse {
  bool success = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
  string device_id = 2;
}

message RefreshTokenResponse {
  Account account = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message CreateOrUpdateMerchantDetailsRequest {
  string id = 1;
  string account_id = 2;
  string phone_number = 3;
  string address = 4;
  string city = 5;
  string state = 6;
  string pincode = 7;
}

message CreateOrUpdateMerchantInfoRequest {
  string id = 1;
  string phone_number = 2;
  string address = 3;
  string city = 4;
  string state = 5;
  string pincode = 6;
}

message CreateOrUpdateMerchantDetailsResponse {
  MerchantDetails merchant_details = 1;
}

message GetMerchantDetailsRequest {
  string account_id = 1;
}

message GetMerchantDetailsResponse {
  MerchantDetails merchant_details = 1;
}

// Products
message CreateOrUpdateProductRequest {
    string id = 1;
    string name = 2;
    string category = 3;
    string description = 4;
    string status = 5;
}

message CreateOrUpdateProductResponse {
    Product product = 1;
}

message ListProductsRequest {
    uint32 skip = 1;
    uint32 take = 2;
}

message ListProductsResponse {
    repeated Product products = 1;
}

message GetSystemMetricsRequest {}

message GetSystemMetricsResponse {
  uint32 total_users = 1;
  uint32 total_products = 2;
}

// Grades
message CreateOrUpdateGradeRequest {
    string id = 1;
    string product_id = 2;
    string name = 3;
    string description = 4;
    string status = 5;
}

message CreateOrUpdateGradeResponse {
    Grade grade = 1;
}

message ListGradesByProductIdRequest {
    string product_id = 1;
    uint32 skip = 2;
    uint32 take = 3;
}

message ListGradesByProductIdResponse {
    repeated Grade grades = 1;
}

// Daily Prices
message CreateOrUpdateDailyPriceRequest {
    string id = 1;
    string product_id = 2;
    string grade_id = 3;
    double price = 4;
    string date = 5;
    string time = 6;
}

message CreateOrUpdateDailyPriceResponse {
    DailyPrice daily_price = 1;
}

message ListDailyPricesRequest {
    string grade_id = 1;
    string today = 2;
    int32 duration = 3;
}

message ListDailyPricesResponse {
    repeated DailyPrice daily_prices = 1;
}

message GetTodaysPriceRequest {
    string grade_id = 1;
    string date = 2;
}

message GetTodaysPriceResponse {
    repeated DailyPrice daily_prices = 1;
}

message GetTodaysByProductIdRequest {
    string product_id = 1;
    string date = 2;
}

message GetTodaysByProductIdResponse {
    repeated DailyPrice daily_prices = 1;
}

message GetProductsWithGradesAndPricesRequest {
  string date = 1;
  string search =2;
}

message GetProductsWithGradesAndPricesResponse {
  repeated ProductWithGrades products = 1;
}

message GetAccountInfoRequest {}

message GetMerchantInfoRequest {}

service ControlService {
  rpc CheckEmailExists(CheckEmailExistsRequest) returns (CheckEmailExistsResponse);
  rpc CreateOrUpdateAccount(CreateOrUpdateAccountRequest) returns (CreateOrUpdateAccountResponse);
  rpc GetAccountByID(GetAccountByIDRequest) returns (GetAccountByIDResponse);
  rpc GetAccountInfo(GetAccountInfoRequest) returns (GetAccountByIDResponse);
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc CreateOrUpdateMerchantDetails(CreateOrUpdateMerchantDetailsRequest) returns (CreateOrUpdateMerchantDetailsResponse);
  rpc GetMerchantDetails(GetMerchantDetailsRequest) returns (GetMerchantDetailsResponse);
  rpc GetMerchantInfo(GetMerchantInfoRequest) returns (GetMerchantDetailsResponse);
  rpc CreateOrUpdateMerchantInfo(CreateOrUpdateMerchantInfoRequest) returns (CreateOrUpdateMerchantDetailsResponse);


  // Product Management
  rpc CreateOrUpdateProduct(CreateOrUpdateProductRequest) returns (CreateOrUpdateProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  
  // Grade Management
  rpc CreateOrUpdateGrade(CreateOrUpdateGradeRequest) returns (CreateOrUpdateGradeResponse);
  rpc ListGradesByProductId(ListGradesByProductIdRequest) returns (ListGradesByProductIdResponse);

  // Daily Price Management
  rpc CreateOrUpdateDailyPrice(CreateOrUpdateDailyPriceRequest) returns (CreateOrUpdateDailyPriceResponse);
  rpc ListDailyPrices(ListDailyPricesRequest) returns (ListDailyPricesResponse);
  rpc GetTodaysPrice(GetTodaysPriceRequest) returns (GetTodaysPriceResponse);
  rpc GetTodaysByProductId(GetTodaysByProductIdRequest) returns (GetTodaysByProductIdResponse);
  rpc GetProductsWithGradesAndPrices(GetProductsWithGradesAndPricesRequest) returns (GetProductsWithGradesAndPricesResponse);
  rpc GetSystemMetrics(GetSystemMetricsRequest) returns (GetSystemMetricsResponse);
}